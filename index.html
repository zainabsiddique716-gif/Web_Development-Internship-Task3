<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Form</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
    🌙
  </button>

  <main class="page">

    
  <main class="page">

    <section class="card">
      <h1>Feedback Form</h1>
      <p class="subtitle">We would love to hear your thoughts.</p>

      <div id="formStatus" class="form-status" role="status" aria-live="polite"></div>

      <form id="feedbackForm" novalidate>

        <!-- ---------- Full Name Field ---------- -->
        <div class="form-group">
          <label for="fullName">Full Name <span class="required">*</span></label>
          <input
            type="text"
            id="fullName"
            name="fullName"
            placeholder="e.g. Zainab Siddique"
          >
          <!-- Empty span where we will insert an error message via JS -->
          <span class="error-message" id="fullNameError"></span>
        </div>

        <!-- ---------- Email Field ---------- -->
        <div class="form-group">
          <label for="email">Email <span class="required">*</span></label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="e.g. zainab@example.com"
          >
          <span class="error-message" id="emailError"></span>
        </div>

        <!-- ---------- Category Dropdown ---------- -->
        <div class="form-group">
          <label for="category">Category <span class="required">*</span></label>
          <select id="category" name="category">
            <option value="">-- Select a category --</option>
            <option value="General">General</option>
            <option value="Bug Report">Bug Report</option>
            <option value="Suggestion">Suggestion</option>
          </select>
          <span class="error-message" id="categoryError"></span>
        </div>

        <fieldset class="form-group">
          <legend>Rating <span class="required">*</span></legend>

          <div class="rating-group">
            <label class="radio-label" for="rating1">
              <input type="radio" id="rating1" name="rating" value="1"> 1
            </label>
            <label class="radio-label" for="rating2">
              <input type="radio" id="rating2" name="rating" value="2"> 2
            </label>
            <label class="radio-label" for="rating3">
              <input type="radio" id="rating3" name="rating" value="3"> 3
            </label>
            <label class="radio-label" for="rating4">
              <input type="radio" id="rating4" name="rating" value="4"> 4
            </label>
            <label class="radio-label" for="rating5">
              <input type="radio" id="rating5" name="rating" value="5"> 5
            </label>
          </div>
          <span class="error-message" id="ratingError"></span>
        </fieldset>

        <!-- ---------- Message Textarea ---------- -->
        <div class="form-group">
          <label for="message">Message <span class="required">*</span></label>
          <textarea
            id="message"
            name="message"
            rows="5"
            placeholder="Write your feedback here (10 to 500 characters)..."
          ></textarea>

          <div class="textarea-footer">
            <span class="error-message" id="messageError"></span>
            <span class="char-counter" id="messageCounter">0/500</span>
          </div>
        </div>

        <!-- ---------- Submit Button ---------- -->
        <button type="submit" id="submitBtn" class="submit-btn">
          <!-- Normal button text -->
          <span id="submitBtnText">Submit Feedback</span>
          <span id="spinner" class="spinner hidden"></span>
        </button>

      </form>
    </section>

    <section class="card">
      <h2>Recent Submissions</h2>
      <p class="subtitle small">Showing the last 5 feedback entries submitted from this browser.</p>

      <ul id="postsList" class="posts-list"></ul>
    </section>
    
    <section class="card">
      <h2>Sample Posts (API Feed)</h2>
      <p class="subtitle small">Demo data fetched live from the JSONPlaceholder API using a GET request.</p>

      <button id="loadPostsBtn" class="submit-btn" type="button" style="margin-bottom: 16px;">
        Load Latest Posts
      </button>

      <ul id="apiPostsList" class="posts-list"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
